<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location Tracker</title>
    <!-- Leaflet CSS for the Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 24px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2), 0 2px 4px -1px rgba(79, 70, 229, 0.1);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3), 0 4px 6px -2px rgba(79, 70, 229, 0.15);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn svg {
            width: 22px;
            height: 22px;
        }

        #map {
            height: 500px;
            width: 100%;
            background: #E5E7EB;
            z-index: 1; /* For leaflet controls */
        }
        
        .status {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            min-height: 20px;
            transition: color 0.3s ease;
        }

        .loading-spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Customize Leaflet Popup */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .leaflet-popup-content {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-main);
            margin: 12px 16px;
        }
        
        /* Pulse Animation for Marker */
        .pulse-marker {
            background: rgba(79, 70, 229, 0.5);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(79, 70, 229, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Where am I?</h1>
            <p>Click the button below to discover your exact current location and view it pinned on the interactive map.</p>
            
            <button class="btn" id="find-me-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span id="btn-text">Locate Me</span>
                <div class="loading-spinner" id="loading-spinner"></div>
            </button>
            
            <div class="status" id="status-msg"></div>
        </div>
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Initialize map centered roughly on the world
        const map = L.map('map', {
            zoomControl: false // We'll add it back to position it nicely
        }).setView([20, 0], 2);

        // Add Zoom control to bottom right
        L.control.zoom({
            position: 'bottomright'
        }).addTo(map);

        // Add vibrant OpenStreetMap tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        let currentMarker = null;
        let currentCircle = null;

        const btn = document.getElementById('find-me-btn');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('loading-spinner');
        const statusMsg = document.getElementById('status-msg');
        const btnIcon = btn.querySelector('svg');

        btn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                showError('Geolocation is not supported by your browser.');
                return;
            }

            // Set loading state
            btn.style.pointerEvents = 'none';
            btnText.style.display = 'none';
            btnIcon.style.display = 'none';
            spinner.style.display = 'block';
            statusMsg.textContent = 'Acquiring GPS coordinates...';
            statusMsg.style.color = 'var(--text-muted)';

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    // Reset button state
                    btn.style.pointerEvents = 'auto';
                    btnText.style.display = 'block';
                    btnIcon.style.display = 'block';
                    spinner.style.display = 'none';
                    
                    statusMsg.innerHTML = `Location successfully found! <span style="opacity: 0.7; font-size: 12px; margin-left: 5px;">(Accuracy: ${Math.round(accuracy)}m)</span>`;
                    statusMsg.style.color = '#10B981'; // Green

                    // Remove existing marker/circle if they exist
                    if (currentMarker) map.removeLayer(currentMarker);
                    if (currentCircle) map.removeLayer(currentCircle);

                    // Custom Leaflet Icon
                    const customIcon = L.icon({
                        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-violet.png',
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41],
                        iconAnchor: [12, 41],
                        popupAnchor: [1, -34],
                        shadowSize: [41, 41]
                    });

                    // Add new marker and accuracy circle
                    currentMarker = L.marker([lat, lng], { icon: customIcon }).addTo(map);
                    
                    currentCircle = L.circle([lat, lng], { 
                        radius: accuracy, 
                        color: 'var(--primary)', 
                        fillColor: 'var(--primary)', 
                        fillOpacity: 0.1,
                        weight: 1
                    }).addTo(map);

                    // Smoothly animate to the new location
                    map.flyTo([lat, lng], 16, {
                        animate: true,
                        duration: 1.5 // in seconds
                    });
                    
                    // Add popup to marker
                    setTimeout(() => {
                        currentMarker.bindPopup("📍 <b>You are right here!</b>").openPopup();
                    }, 1500); // Wait for flyTo to finish
                },
                (error) => {
                    // Reset button state
                    btn.style.pointerEvents = 'auto';
                    btnText.style.display = 'block';
                    btnIcon.style.display = 'block';
                    spinner.style.display = 'none';

                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            showError("Location access denied. Please enable permissions in your browser.");
                            break;
                        case error.POSITION_UNAVAILABLE:
                            showError("Location information is currently unavailable.");
                            break;
                        case error.TIMEOUT:
                            showError("The request to get your location timed out.");
                            break;
                        case error.UNKNOWN_ERROR:
                            showError("An unknown error occurred while trying to find you.");
                            break;
                    }
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        });

        function showError(msg) {
            statusMsg.textContent = msg;
            statusMsg.style.color = '#EF4444'; // Red
        }
    </script>
</body>
</html>
